<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>agentic · dashboard</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --line:#21262d; --fg:#e6edf3; --mut:#8b949e;
    --acc:#58a6ff; --ok:#3fb950; --warn:#d29922; --bad:#f85149;
    --picker:#58a6ff; --reviewer:#bc8cff; --solver:#3fb950; --jury:#d29922;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  header { display:flex; align-items:baseline; gap:24px; flex-wrap:wrap;
    padding:16px 24px; border-bottom:1px solid var(--line); position:sticky; top:0;
    background:var(--bg); z-index:2; }
  header h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  header h1 .dot { color:var(--ok); }
  .stat { color:var(--mut); }
  .stat b { color:var(--fg); font-size:18px; }
  main { padding:20px 24px; max-width:1400px; }
  section { margin-bottom:28px; }
  h2 { font-size:12px; text-transform:uppercase; letter-spacing:1px;
    color:var(--mut); margin:0 0 10px; font-weight:600; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:7px 10px; border-bottom:1px solid var(--line);
    white-space:nowrap; }
  th { color:var(--mut); font-weight:600; font-size:11px; text-transform:uppercase; }
  td.num,th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .badge { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px;
    border:1px solid var(--line); }
  .b-running{ color:var(--ok); border-color:var(--ok); }
  .b-claimed,.b-solving,.b-awaiting_jury,.b-pending_solver{ color:var(--acc); border-color:var(--acc); }
  .b-graded{ color:var(--mut); }
  .b-failed{ color:var(--bad); border-color:var(--bad); }
  .b-stalled{ color:var(--warn); border-color:var(--warn); }
  .b-pending{ color:var(--mut); }
  .v-pass{ color:var(--ok); border-color:var(--ok); }
  .v-fail{ color:var(--bad); border-color:var(--bad); }
  .v-borderline{ color:var(--warn); border-color:var(--warn); }
  .v-unscored{ color:var(--mut); }
  .avg{ color:var(--mut); margin-left:6px; }
  .prob-cell{ cursor:pointer; }
  .prob-cell:hover .title{ color:var(--acc); }
  .prob-cell .caret{ display:inline-block; width:12px; color:var(--mut); }
  .verdict-detail td{ white-space:normal; background:var(--panel); padding:0; }
  .verdict-detail .wrap{ padding:10px 14px; }
  .attempt{ border:1px solid var(--line); border-radius:6px; padding:8px 12px; margin:6px 0; background:var(--bg); }
  .attempt-head{ display:flex; align-items:center; gap:10px; }
  .attempt-head .aname{ font-weight:600; }
  .attempt-head .spacer{ flex:1; }
  .attempt-head .best-tag{ font-size:10px; text-transform:uppercase; letter-spacing:.5px;
    color:var(--ok); border:1px solid var(--ok); border-radius:10px; padding:0 7px; }
  button.viz{ border-color:var(--acc); color:var(--acc); }
  .attempt-rubric{ margin-top:8px; }
  .verdict-detail .crit{ display:flex; gap:10px; padding:3px 0; align-items:baseline; }
  .verdict-detail .crit .name{ width:200px; color:var(--mut); flex:0 0 auto; }
  .verdict-detail .crit .sc{ width:34px; flex:0 0 auto; font-variant-numeric:tabular-nums; }
  .verdict-detail .crit .na{ color:var(--mut); }
  .verdict-detail .summary{ margin-top:8px; color:var(--mut); white-space:pre-wrap; }
  .pulse{ animation:pulse 1.4s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; }
  .timeline-row{ display:flex; align-items:center; gap:12px; padding:6px 0;
    border-bottom:1px solid var(--line); }
  .timeline-row .slug{ width:200px; overflow:hidden; text-overflow:ellipsis; }
  .bars{ display:flex; gap:3px; flex:1; }
  .stagebar{ height:18px; border-radius:3px; display:flex; align-items:center;
    justify-content:center; font-size:10px; color:#0d1117; min-width:36px; padding:0 6px; }
  .empty{ color:var(--mut); padding:18px; text-align:center; }
  .mut{ color:var(--mut); }
  button{ font:inherit; color:var(--fg); background:var(--panel); border:1px solid var(--line);
    border-radius:6px; padding:3px 12px; cursor:pointer; }
  button:hover:not(:disabled){ border-color:var(--acc); color:var(--acc); }
  button:disabled{ opacity:.35; cursor:default; }
  button.primary{ border-color:var(--ok); color:var(--ok); }
  button.start{ padding:2px 10px; font-size:12px; }
  button.warn{ border-color:var(--warn); color:var(--warn); }
  .controls{ margin-left:auto; display:flex; align-items:center; gap:8px; }
  .controls input[type=number]{ font:inherit; width:56px; text-align:right; color:var(--fg);
    background:var(--bg); border:1px solid var(--line); border-radius:6px; padding:3px 6px; }
  .controls input[type=number]:focus{ outline:none; border-color:var(--acc); }
  #toast{ position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:9; }
  .toast{ background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--acc);
    border-radius:6px; padding:8px 14px; min-width:220px; animation:slidein .2s; }
  .toast.ok{ border-left-color:var(--ok); }
  .toast.err{ border-left-color:var(--bad); }
  @keyframes slidein{ from{transform:translateX(20px);opacity:0} to{transform:none;opacity:1} }
  .toggle{ display:inline-flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .toggle .seg{ border:none; border-radius:0; padding:2px 10px; font-size:11px; letter-spacing:0;
    text-transform:none; background:var(--panel); color:var(--mut); }
  .toggle .seg:hover:not(.active){ color:var(--fg); border-color:transparent; }
  .toggle .seg.active{ background:var(--acc); color:#0d1117; }
  .legend{ display:flex; gap:14px; font-size:11px; color:var(--mut); margin-bottom:8px; flex-wrap:wrap; }
  .legend:empty{ display:none; }
  .legend i{ display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:4px; vertical-align:middle; }
  svg text{ fill:var(--mut); font-size:10px; }
  .chart-wrap{ position:relative; }
  .chart-tip{ position:absolute; pointer-events:none; z-index:3; min-width:120px;
    background:var(--bg); border:1px solid var(--line); border-radius:6px; padding:7px 9px;
    font-size:11px; line-height:1.5; box-shadow:0 4px 12px rgba(0,0,0,.4); transform:translate(-50%,-100%); }
  .chart-tip .tip-x{ color:var(--mut); margin-bottom:3px; }
  .chart-tip .tip-row{ display:flex; gap:8px; justify-content:space-between; white-space:nowrap; }
  .chart-tip .tip-row i{ display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:5px; vertical-align:middle; }
  .chart-tip .tip-row b{ color:var(--fg); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<header>
  <h1><span class="dot">●</span> agentic dashboard</h1>
  <span class="stat">running <b id="s-running">–</b></span>
  <span class="stat">stalled <b id="s-stalled">–</b></span>
  <span class="stat">total cost <b id="s-cost">–</b></span>
  <span class="stat">total tokens <b id="s-tokens">–</b></span>
  <span class="controls">
    <input type="number" id="pending-count" min="1" value="5"
      title="How many pending tasks to start" oninput="syncPendingLabel()" />
    <button class="primary" id="start-pending" onclick="startPending()">▶ Start next <span id="pending-n">5</span> pending</button>
    <button class="warn" id="retry-failed" onclick="retryFailed()" disabled>↻ Retry failed</button>
  </span>
  <span class="stat" id="s-conn">connecting…</span>
</header>
<div id="toast"></div>
<main>
  <section>
    <h2>Running now</h2>
    <div id="running"></div>
  </section>

  <section>
    <h2 style="display:flex;align-items:center;gap:10px">
      <span id="chart-title">Cumulative cost</span>
      <span class="toggle" id="metric-toggle">
        <button class="seg active" data-metric="cost" onclick="setMetric('cost')">cost</button>
        <button class="seg" data-metric="tokens" onclick="setMetric('tokens')">tokens</button>
      </span>
      <span class="toggle" id="cost-toggle">
        <button class="seg active" data-mode="total" onclick="setCostMode('total')">total</button>
        <button class="seg" data-mode="model" onclick="setCostMode('model')">per model</button>
      </span>
    </h2>
    <div class="panel">
      <div class="legend" id="cost-legend"></div>
      <div class="chart-wrap">
        <svg id="chart" width="100%" height="140" preserveAspectRatio="none"></svg>
        <div id="chart-tip" class="chart-tip" style="display:none"></div>
      </div>
    </div>
  </section>

  <section>
    <h2>Stage timeline</h2>
    <div class="legend">
      <span><i style="background:var(--picker)"></i>picker</span>
      <span><i style="background:var(--reviewer)"></i>reviewer</span>
      <span><i style="background:var(--solver)"></i>solver</span>
      <span><i style="background:var(--jury)"></i>jury</span>
      <span class="mut">bar width ∝ tokens</span>
    </div>
    <div class="panel" id="timeline"></div>
  </section>

  <section>
    <h2>All problems</h2>
    <table>
      <thead><tr>
        <th>Problem</th><th>Status</th><th>Verdict</th><th>Stage</th>
        <th class="num">In</th><th class="num">Out</th>
        <th class="num">Calls</th><th class="num">Cost</th><th class="num">Last seen</th><th></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </section>
</main>

<script>
const STAGE_COLORS = {picker:"var(--picker)",reviewer:"var(--reviewer)",solver:"var(--solver)",jury:"var(--jury)"};
const MODEL_COLORS = ["#58a6ff","#bc8cff","#3fb950","#d29922","#f85149","#39c5cf","#db61a2","#e3b341"];
let lastView = null;        // latest snapshot, so the toggles can redraw without new data
let costMode = "total";     // "total" | "model"
let metricMode = "cost";    // "cost" | "tokens"
let chartState = null;      // cached geometry + lines, so hover can read exact values
const fmt = n => n>=1e6 ? (n/1e6).toFixed(2)+"M" : n>=1e3 ? (n/1e3).toFixed(1)+"k" : ""+n;
const usd = n => "$"+(n||0).toFixed(4);
const tokFull = n => Math.round(n||0).toLocaleString();
const ago = s => s==null ? "–" : s<60 ? Math.round(s)+"s" : s<3600 ? Math.round(s/60)+"m" : Math.round(s/3600)+"h";
const esc = s => (s+"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const expandedProblems = new Set();   // slugs whose attempts detail row is open
const VERDICT_COLS = 10;              // colspan for the detail row (All problems table)
const VCLASS = {pass:"v-pass",fail:"v-fail",borderline:"v-borderline"};

// Inline cell: the BEST verdict across all of a problem's attempts (or a dash
// when nothing has been graded yet).
function verdictCell(p){
  const vr=p.verdict;
  if(!vr) return `<span class="mut">–</span>`;
  const cls=VCLASS[vr.overall]||"v-unscored";
  const avg=vr.score_avg!=null ? `<span class="avg">${vr.score_avg}</span>` : "";
  return `<span class="badge ${cls}">${esc(vr.overall)}</span>${avg}`;
}

// Per-criterion rubric + jury summary for one attempt's verdict.
function attemptRubric(vr){
  if(!vr) return `<div class="mut">Not graded yet.</div>`;
  const crit=vr.criteria.map(c=>`
    <div class="crit">
      <span class="name">${esc(c.key.replace(/_/g," "))}</span>
      <span class="sc ${c.score?'':'na'}">${c.score?c.score+"/5":"n/a"}</span>
      <span>${esc(c.note)}</span>
    </div>`).join("") || `<div class="mut">No scored criteria.</div>`;
  const summary=vr.notes ? `<div class="summary">${esc(vr.notes)}</div>` : "";
  return crit+summary;
}

// Hidden-by-default detail row: one card per attempt, each with its verdict,
// rubric, and a button to open its Gradio visualisation in a new tab.
function attemptsDetailRow(p){
  const open=expandedProblems.has(p.slug);
  const atts=p.attempts||[];
  const body = atts.length ? atts.map(a=>{
    const vr=a.verdict;
    const cls=vr ? (VCLASS[vr.overall]||"v-unscored") : "v-unscored";
    const badge=vr ? `<span class="badge ${cls}">${esc(vr.overall)}</span>` : `<span class="mut">ungraded</span>`;
    const avg=vr&&vr.score_avg!=null ? `<span class="avg">${vr.score_avg}</span>` : "";
    const best=a.name===p.best_attempt ? `<span class="best-tag">best</span>` : "";
    const viz=a.has_app
      ? `<button class="start viz" onclick="openApp('${esc(p.slug)}','${esc(a.name)}',this)">Open visualisation ↗</button>`
      : `<span class="mut">no app</span>`;
    return `<div class="attempt">
      <div class="attempt-head">
        <span class="aname">${esc(a.name)}</span>${badge}${avg}${best}
        <span class="spacer"></span>${viz}
      </div>
      <div class="attempt-rubric">${attemptRubric(vr)}</div>
    </div>`;
  }).join("") : `<div class="mut">No attempts yet.</div>`;
  return `<tr class="verdict-detail" data-slug="${esc(p.slug)}" style="display:${open?'table-row':'none'}">
    <td colspan="${VERDICT_COLS}"><div class="wrap">${body}</div></td></tr>`;
}

function toggleProblem(slug){
  if(expandedProblems.has(slug)) expandedProblems.delete(slug);
  else expandedProblems.add(slug);
  const open=expandedProblems.has(slug);
  const row=document.querySelector(`tr.verdict-detail[data-slug="${slug}"]`);
  if(row) row.style.display = open ? "table-row" : "none";
  const caret=document.querySelector(`td.prob-cell[data-slug="${slug}"] .caret`);
  if(caret) caret.textContent = open ? "▾" : "▸";
}

// Open an attempt's Gradio app in a new tab. The blank tab is opened
// synchronously (so the popup blocker allows it), then pointed at the URL once
// the server is up.
function openApp(slug, attempt, btn){
  const tab=window.open("", "_blank");
  if(tab) tab.document.write(`<title>launching…</title><body style="font:14px/1.5 ui-monospace,monospace;background:#0d1117;color:#e6edf3;padding:40px">Launching <b>${esc(slug)} / ${esc(attempt)}</b> visualisation… this can take a moment.</body>`);
  const old=btn?btn.textContent:null;
  if(btn){ btn.disabled=true; btn.textContent="launching…"; }
  post("/api/launch-app",{slug,attempt})
    .then(d=>{ if(tab) tab.location=d.url; else window.open(d.url,"_blank"); toast(`Launched ${slug}/${attempt}`,"ok"); })
    .catch(e=>{ if(tab) tab.document.body.innerHTML=`Failed to launch: ${esc(e.message)}`; toast(`Could not launch ${slug}/${attempt}: ${e.message}`,"err"); })
    .finally(()=>{ if(btn){ btn.disabled=false; btn.textContent=old; } });
}

function render(v){
  lastView = v;
  document.getElementById("s-running").textContent = v.running_count;
  document.getElementById("s-stalled").textContent = v.stalled_count;
  document.getElementById("s-cost").textContent = usd(v.totals.cost_usd);
  document.getElementById("s-tokens").textContent = fmt(v.totals.input_tokens + v.totals.output_tokens);

  // Enable "Retry failed" only when something is actually failed, and show the count.
  const failed = v.problems.filter(p=>p.status==="failed").length;
  const retryBtn = document.getElementById("retry-failed");
  retryBtn.disabled = failed===0;
  retryBtn.textContent = failed ? `↻ Retry ${failed} failed` : "↻ Retry failed";

  // Running now
  const running = v.problems.filter(p=>p.is_running||p.is_stalled);
  document.getElementById("running").innerHTML = running.length ? `
    <table><thead><tr>
      <th>Problem</th><th>State</th><th>Stage</th>
      <th class="num">Tokens</th><th class="num">Cost</th><th class="num">Active</th>
    </tr></thead><tbody>${running.map(p=>`
      <tr>
        <td>${esc(p.title)} <span class="mut">${esc(p.slug)}</span></td>
        <td><span class="badge ${p.is_stalled?'b-stalled':'b-running pulse'}">${p.is_stalled?'stalled':'running'}</span></td>
        <td>${esc(p.current_stage||'–')}</td>
        <td class="num">${fmt(p.totals.input_tokens+p.totals.output_tokens)}</td>
        <td class="num">${usd(p.totals.cost_usd)}</td>
        <td class="num">${ago(p.last_event_age_s)}</td>
      </tr>`).join("")}</tbody></table>`
    : `<div class="empty">No agents currently running.</div>`;

  // All problems
  document.getElementById("rows").innerHTML = v.problems.map(p=>{
    const n=(p.attempts||[]).length;
    return `
    <tr>
      <td class="prob-cell" data-slug="${esc(p.slug)}" onclick="toggleProblem('${esc(p.slug)}')"
        title="${n?`Show ${n} attempt${n===1?'':'s'}`:'No attempts yet'}">
        <span class="caret">${expandedProblems.has(p.slug)?'▾':'▸'}</span><span class="title">${esc(p.title)}</span>
        <span class="mut">${esc(p.slug)}${n?` · ${n} attempt${n===1?'':'s'}`:''}</span></td>
      <td><span class="badge b-${p.is_stalled?'stalled':p.status}">${p.is_stalled?'stalled':esc(p.status)}</span></td>
      <td>${verdictCell(p)}</td>
      <td>${esc(p.current_stage||'–')}</td>
      <td class="num">${fmt(p.totals.input_tokens)}</td>
      <td class="num">${fmt(p.totals.output_tokens)}</td>
      <td class="num">${p.totals.n_calls}</td>
      <td class="num">${usd(p.totals.cost_usd)}</td>
      <td class="num">${ago(p.last_event_age_s)}</td>
      <td>${p.is_startable
        ? `<button class="start" onclick="startSlug('${esc(p.slug)}',this)">${p.status==='pending'?'Start':'Re-run'}</button>`
        : `<span class="mut">running</span>`}</td>
    </tr>${attemptsDetailRow(p)}`;
  }).join("");

  // Stage timeline (bar width ∝ tokens within each problem)
  const withStages = v.problems.filter(p=>p.stage_timeline.length);
  document.getElementById("timeline").innerHTML = withStages.length ? withStages.map(p=>{
    const tot = p.stage_timeline.reduce((a,s)=>a+s.input_tokens+s.output_tokens,0)||1;
    return `<div class="timeline-row">
      <span class="slug" title="${esc(p.slug)}">${esc(p.slug)}</span>
      <div class="bars">${p.stage_timeline.map(s=>{
        const t=s.input_tokens+s.output_tokens;
        const w=Math.max(4,(t/tot)*100);
        return `<div class="stagebar" style="flex:0 0 ${w}%;background:${STAGE_COLORS[s.stage]||'#444'}"
          title="${esc(s.stage)} · ${fmt(t)} tok · ${usd(s.cost_usd)}">${s.stage}</div>`;
      }).join("")}</div>
      <span class="num mut" style="width:70px">${usd(p.totals.cost_usd)}</span>
    </div>`;
  }).join("") : `<div class="empty">No model usage recorded yet.</div>`;

  drawChart(v);
}

function setCostMode(mode){
  costMode = mode;
  document.querySelectorAll("#cost-toggle .seg").forEach(b=>b.classList.toggle("active", b.dataset.mode===mode));
  if(lastView) drawChart(lastView);
}

function setMetric(mode){
  metricMode = mode;
  document.querySelectorAll("#metric-toggle .seg").forEach(b=>b.classList.toggle("active", b.dataset.metric===mode));
  document.getElementById("chart-title").textContent = mode==="tokens" ? "Cumulative tokens" : "Cumulative cost";
  if(lastView) drawChart(lastView);
}

// Format a value in whatever metric the chart is currently showing.
const metricAxis = n => metricMode==="tokens" ? fmt(n) : usd(n);
const metricTip  = n => metricMode==="tokens" ? tokFull(n)+" tok" : usd(n);

function drawChart(v){
  const svg=document.getElementById("chart");
  const legend=document.getElementById("cost-legend");
  const series=v.cost_series||[];
  const W=svg.clientWidth||800, H=140, pad=24;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  if(!series.length){
    svg.innerHTML=`<text x="${W/2}" y="${H/2}" text-anchor="middle">no usage yet</text>`;
    legend.innerHTML=""; chartState=null; hideTip(); return;
  }
  const X=i=>pad+(series.length<2?0:i/(series.length-1))*(W-2*pad);

  // Pull the right metric off each point: cost (USD) or tokens.
  const total = p => metricMode==="tokens" ? p.cumulative_tokens : p.cumulative_cost_usd;
  const perModel = (p,m) => metricMode==="tokens"
    ? (p.tokens_by_model&&p.tokens_by_model[m])||0
    : (p.by_model&&p.by_model[m])||0;

  // One line per model when in "model" mode, else a single total line.
  let lines;
  if(costMode==="model"){
    lines=(v.cost_models||[]).map((m,idx)=>({
      name:m, color:MODEL_COLORS[idx%MODEL_COLORS.length],
      vals:series.map(p=>perModel(p,m)),
    }));
  }else{
    lines=[{name:"total", color:"var(--acc)", vals:series.map(total)}];
  }
  const max=Math.max(metricMode==="tokens"?1:1e-9,...lines.flatMap(l=>l.vals));
  const Y=val=>H-pad-(val/max)*(H-2*pad);
  const path=vals=>vals.map((val,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(val).toFixed(1)}`).join(" ");

  let inner="";
  if(lines.length===1){
    const d=path(lines[0].vals);
    inner+=`<path d="${d} L${X(series.length-1).toFixed(1)},${H-pad} L${X(0).toFixed(1)},${H-pad} Z" fill="rgba(88,166,255,.12)"/>`;
  }
  inner+=lines.map(l=>`<path d="${path(l.vals)}" fill="none" stroke="${l.color}" stroke-width="1.5"/>`).join("");
  inner+=`<text x="${pad}" y="14">${metricAxis(max)}</text>
    <text x="${pad}" y="${H-6}">${metricMode==="tokens"?"0":"$0"}</text>
    <text x="${W-pad}" y="${H-6}" text-anchor="end">${series.length} calls</text>`;
  // Hover overlay lives in its own group so we can redraw it without rebuilding the chart.
  inner+=`<g id="chart-hover"></g>`;
  svg.innerHTML=inner;

  // Cache everything the hover handler needs in viewBox coordinates.
  chartState={series, lines, X, Y, W, H, pad};

  legend.innerHTML = costMode==="model"
    ? lines.map(l=>`<span><i style="background:${l.color}"></i>${esc(l.name)} ${metricAxis(l.vals[l.vals.length-1])}</span>`).join("")
    : "";
}

function hideTip(){
  const tip=document.getElementById("chart-tip");
  if(tip) tip.style.display="none";
  const g=document.getElementById("chart-hover");
  if(g) g.innerHTML="";
}

function onChartMove(e){
  if(!chartState){ return; }
  const {series, lines, X, Y, W, H, pad}=chartState;
  const svg=document.getElementById("chart");
  const rect=svg.getBoundingClientRect();
  // Map cursor (client px) into the plot's data index, accounting for padding.
  const frac=(e.clientX-rect.left)/rect.width;            // 0..1 across the svg
  const padFrac=pad/W;
  const plot=Math.max(0,Math.min(1,(frac-padFrac)/(1-2*padFrac)));
  const i=series.length<2 ? 0 : Math.round(plot*(series.length-1));
  const cx=X(i);

  // Vertical guide + a dot on each line at this call index.
  let g=`<line x1="${cx.toFixed(1)}" y1="${pad}" x2="${cx.toFixed(1)}" y2="${H-pad}"
    stroke="var(--mut)" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>`;
  g+=lines.map(l=>`<circle cx="${cx.toFixed(1)}" cy="${Y(l.vals[i]).toFixed(1)}" r="3"
    fill="${l.color}"/>`).join("");
  document.getElementById("chart-hover").innerHTML=g;

  // Tooltip: one row per line, highest value first.
  const rows=lines.map(l=>({name:l.name, color:l.color, val:l.vals[i]}))
    .sort((a,b)=>b.val-a.val)
    .map(r=>`<div class="tip-row"><span><i style="background:${r.color}"></i>${esc(r.name)}</span><b>${metricTip(r.val)}</b></div>`)
    .join("");
  const tip=document.getElementById("chart-tip");
  tip.innerHTML=`<div class="tip-x">call ${i+1} / ${series.length}</div>${rows}`;
  tip.style.display="block";
  // Position above the cursor, clamped within the panel so it never clips off-edge.
  const left=Math.max(60,Math.min(rect.width-60,cx/W*rect.width));
  tip.style.left=left+"px";
  tip.style.top=(Y(Math.max(...lines.map(l=>l.vals[i])))/H*rect.height - 8)+"px";
}

function toast(msg, kind){
  const box=document.getElementById("toast");
  const el=document.createElement("div");
  el.className="toast "+(kind||"");
  el.textContent=msg;
  box.appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}

async function post(url, body){
  const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.detail || r.statusText);
  return data;
}

async function startSlug(slug, btn){
  if(btn){ btn.disabled=true; btn.textContent="starting…"; }
  try{
    await post("/api/start",{slug});
    toast(`Started ${slug}`,"ok");
  }catch(e){
    toast(`Could not start ${slug}: ${e.message}`,"err");
    if(btn){ btn.disabled=false; btn.textContent="Start"; }
  }
}

function pendingCount(){
  const n=parseInt(document.getElementById("pending-count").value,10);
  return Number.isFinite(n) && n>0 ? n : null;
}

function syncPendingLabel(){
  const n=pendingCount();
  document.getElementById("pending-n").textContent = n==null ? "all" : n;
}

async function startPending(){
  const btn=document.getElementById("start-pending");
  const count=pendingCount();
  btn.disabled=true;
  try{
    await post("/api/start-pending",{count});
    toast(`Started ${count==null?"all":"next "+count} pending task${count===1?"":"s"}`,"ok");
  }catch(e){
    toast(`Could not start: ${e.message}`,"err");
  }finally{
    setTimeout(()=>{ btn.disabled=false; }, 2000);
  }
}

async function retryFailed(){
  const btn=document.getElementById("retry-failed");
  btn.disabled=true;
  try{
    const data=await post("/api/retry-failed",{});
    toast(data.count ? `Retrying ${data.count} failed task${data.count===1?"":"s"}` : "No failed tasks to retry","ok");
  }catch(e){
    toast(`Could not retry: ${e.message}`,"err");
    btn.disabled=false;
  }
}

function connect(){
  const conn=document.getElementById("s-conn");
  const es=new EventSource("/api/stream");
  es.onopen=()=>conn.textContent="● live";
  es.onmessage=e=>{ try{ render(JSON.parse(e.data)); }catch(err){ console.error(err);} };
  es.onerror=()=>{ conn.textContent="reconnecting…"; };
}

const chartEl=document.getElementById("chart");
chartEl.addEventListener("mousemove", onChartMove);
chartEl.addEventListener("mouseleave", hideTip);
connect();
</script>
</body>
</html>
